{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banknote Validator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>

    <!-- Header -->
    <header class="site-header">
        <div class="header-inner">
            <div class="brand">
                <div class="brand-mark">BV</div>
                <div class="brand-text">
                    <span class="brand-name">Banknote Validator</span>
                    <span class="brand-sub">Vision AI System</span>
                </div>
            </div>
            <div class="header-controls">
                <div class="connection-status" id="connectionStatus">
                    <span class="conn-dot" id="connDot"></span>
                    <span class="conn-label" id="connLabel">Connecting...</span>
                </div>
                <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle dark mode">
                    <span class="theme-icon" id="themeIcon">☾</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Layout -->
    <main class="main-layout">

        <!-- Top Row: Two Columns -->
        <div class="top-row">

            <!-- Left Panel: Verdict -->
            <div class="panel verdict-panel" id="verdictPanel">
                <div class="panel-label">VERDICT</div>
                <div class="verdict-display">
                    <div class="verdict-circle" id="verdictCircle">
                        <div class="verdict-circle-inner">
                            <span class="verdict-symbol" id="verdictSymbol">—</span>
                        </div>
                    </div>
                    <div class="verdict-text" id="verdictText">Awaiting Scan</div>
                    <div class="verdict-timestamp" id="verdictTimestamp">—</div>
                </div>
            </div>

            <!-- Right Panel: Status + History -->
            <div class="right-column">

                <!-- Status Card -->
                <div class="panel status-panel">
                    <div class="panel-label">STATUS</div>
                    <div class="status-display">
                        <div class="status-icon-wrap" id="statusIconWrap">
                            <svg class="status-icon" id="statusIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <circle cx="12" cy="12" r="10"/>
                                <path d="M12 8v4l3 3"/>
                            </svg>
                        </div>
                        <div class="status-info">
                            <div class="status-title" id="statusTitle">Ready</div>
                            <div class="status-detail" id="statusDetail">System awaiting note scan</div>
                        </div>
                    </div>
                    <div class="label-tags" id="labelTags">
                        <span class="tag-empty">No labels yet</span>
                    </div>
                </div>

                <!-- History Card -->
                <div class="panel history-panel">
                    <div class="panel-label">HISTORY</div>
                    <div class="history-list" id="historyList">
                        <div class="history-empty">No scans yet</div>
                    </div>
                </div>

            </div>
        </div>

        <!-- Bottom Row: Log -->
        <div class="panel log-panel">
            <div class="panel-label">SCAN LOG</div>
            <div class="log-entries" id="logEntries">
                <div class="log-entry log-info">
                    <span class="log-time">—</span>
                    <span class="log-msg">System initialised — ready to receive scans</span>
                </div>
            </div>
        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'js/app.js' %}"></script>
</body>
</html>
